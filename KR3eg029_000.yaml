body:
  text: 續集看病須必先熾病凡看傷寒至要看各經中死證脈親須一一理會過免致臨病疑惑但見死證便以脈參之如果有疑切莫下藥雖至親央浼亦莫亂治倘有挫失咎將歸已凡看傷寒初學後生須要治其病之可曉者缺其不可曉者胸中證不明白有一毫疑惑不可強治故君子不強其所不能若不能若不量力私親故或見利而動輕易玩弄新人命如草芥非君子之用心也謹而敬慎母怠母忽初得傷寒一二日頭痛惡寒皆除便覺胸中連臍注悶疼痛脈沉有力坐臥不安上氣喘促不候他證便可下藥若頭項強痛惡寒發熱每日如此不以日數多少尚在太陽經止宜發汗要隨在其所見之表時而治之不拘於日數也若煩渴欲飲水由內水消竭欲得外水自救耳大渴欲飲一升止與一半常今不足不可過飲若恣飲過量則為水結之證射於肺為喘為咳留為噎為噦溢於脾為腫蓄於下焦為癃皆飲水之過也病若經十餘日以上以有下證者止宜大柴胡湯恐承氣太峻蓋傷寒過經則正氣多傷故也病七八日未得汗大便閉發黃生斑譫語而渴越脾桃仁湯主之病八九日已汗下脈尚洪數兩目如火五心煩熱狂葉欲走三黃石膏湯主之病五六日但頭汗出身無汗際徑而還小便自利渴飲水漿此於血證也看上中下分虛實而治之犀角地黃湯治上桃仁承氣湯治中抵當湯當丸治下病六七日別無刑剋證假忽然冒昧不知人事六脈俱靜或至無脈此欲汗忽攻之如久旱將雨六合陰晦雨後蔗物皆蘇換陽這吉候也夫今人治傷寒一二日間不問屬虛屬實便用桂枝之類以類以汗之三五日後不問在表在裡便用承氣湯之類一之多致內外俱虛諸變蜂起大抵病人虛實表裡不同所以邪之傳變有異豈可以日數為淮為蓋有即傳者有傳一二經而止者有始終只在一經者不必拘始太陽終厥陰也陰證初病無熱便四肢厥冷或胸腹中滿或嘔吐腹滿痛下利脈細無力此自陰證受寒即真陰證非從陰經傳來便宜溫之不宜少緩經云發熱惡寒者發於陽也無熱惡者發於陰也治宜四逆湯凡腹痛悉是陰證只有微甚不同治難一概腹痛不大便桂枝芍藥湯腹痛甚桂枝大黃湯若自利腹痛小便清白便當溫理中四逆看微甚用輕者五積散重者四逆湯無脈者通脈四逆湯使陰退而陽復也陰毒病手足指甲皆青脈沉細而急者四逆湯無脈者通脈四逆湯陰毒甘草沁臍中蔥尉氣海關元著艾可二三百壯仍用溫和補氣之藥通內外以復陽氣若俱不效死證也凡看傷寒惟陰證最難識自然陰證人皆可曉及至反常則不能曉矣如身不發熱手足厥冷好靜默不渴泄痢腹痛脈沉細人共知為陰證能至於發熱面赤煩躁不安揭去衣被飲冷脈大人皆不識認作陽證誤投寒藥而死者多矣必須憑脈下藥至為切當不問浮沉大小但指下無力按至筋骨全然無力必有伏陰不可與涼劑急與五積散一服通解表時之寒隨手而愈若內有沉寒之甚須用姜附以溫之祕之勿匯脈雖洪大按無力者重按全無便是陰證凡治傷寒服藥不效斑爛皮膚手足皮俱脫身如塗朱眼如火燥渴欲死脈洪大而有力不知人宜三黃石膏湯主之凡看傷寒須問病人有何疼痛處所苦所欲欲飲食大便並服過何藥問有吐蛔者雖有大熱忌下涼藥犯之必死蓋胃中有寒則蛔上入膈大凶之兆急用炮姜理中湯加烏梅二個煎服蛔安卻以小柴胡湯退熱蓋蛔性聞酸則靜見苦則安故也凡看傷寒有口沃白沫或唾多或流冷涎俱是有寒吳茱萸湯理中真武湯之類看輕重用切忌涼藥雜病亦然或用甘草溫補無氣四君子湯加附子片血虛用仲景八味丸傷暑傷寒與傷寒俱有熱若作傷寒治則大誤蓋寒傷營熱傷氣傷寒則外惡寒而脈浮緊傷暑則不惡寒而脈虛此為異耳經云脈盛身熱得之傷寒脈虛身熱得之傷暑治宜小柴胡湯柴湯柴胡宜酌用渴加知母石膏或人參白虎湯天久淫雨濕今大行蒼朮白虎湯若元氣素弱而傷之重者清暑益氣湯治之急下急溫凡言急下急溫病勢已迫將有變也非若他病尚可少緩如少陰屬腎水主口燥咽乾而渴乃熱邪內熾腎水將絶故當急下以救將絶之水如腹脹不大便土勝水也亦當急下陽明屬土汗多熱盛急下以存津液腹滿痛為土實急當下之熱病目不明熱不巳者死目睛不明腎水巳竭不能照物則已危矣急須下之少陰急溫有二證內寒已甚陽和之氣欲絶急宜溫之無疑也少陰病自利純青色心下必痛口燥咽乾急下之大承氣湯少陰病六七日腹脹不大便急下之大承氣湯陽明病發熱汗多胃汁乾急下之大承氣湯汗出不解腹滿痛急下之大承氣湯少陰病脈沉微急溫之四逆湯少陰病膈上有寒飲乾嘔不可吐急溫之四逆湯生死脈候陽證發熱不退見陰脈者死若得汗熱退見陰脈者瘥陰陽諸證脈平吉傷寒下利厥逆煩躁不得臥者死傷寒咳逆上氣脈散者死形損故也唇物反青四肢熱習習汗出肝先絶也陽反獨留體如煙薰搖頭直視心先絶也環口黧黑汗發黃脾先絶也脈浮而滑身汗如油喘而不休水漿不入肌膚不仁乍靜乍喘汗出發潤肺先絶也溲便遺失腎先絶也脈三部緊盛大汗出不解者死陰陽俱虛熱不止者也身熱氣粗見陽脈而躁者死汗出微熱不解未可言死若脈如轉索即死譫語微熱脈浮大手足溫欲汗出但汗暴出者死熱病七八日脈不軟不散者當音啞不言三四日汗不出者死溫病三四日以下不得汗脈不疾者生脈細小難得者死溫病下痢腹中痛甚者死不治溫病汗不至足者死溫病二三日身體熱腹滿頭痛飲食如故脈直而疾者死四五日頭痛腹滿而吐脈來細僵者死八九日頭不痛目不赤色不變而反下利脈來按之不彈手或時大心下堅者死不堅硬者生熱病七八日其脈微細小溲不利加暴口燥舌焦乾黑者死厥分寒熱辨或曰人之手足乃胃土之末凡脾胃有熱手足必熱脾胃有寒手足必冷理之常也惟傷寒有厥深熱亦深厥微熱之論何耶曰胃寒手足冷胃熱手足熱固巳若夫極則變不可以常道拘也蓋亢則害承乃制火氣亢極反見化水如金銀等烈火爍煬與水無異陰陽反覆病之逆從未可以常理論也凡經言厥逆厥冷手足寒冷等語皆變交耳不可以論輕重若言四肢則有異亦未可純為寒證若厥冷直至臂脛以土則為真寒無疑急用姜附等藥溫之少緩則難療謂其上過手肘下過足膝非內有真寒達於四肢而何然更當憑脈並所見之證參之庶乎其無誤也凡看傷寒不可以厥逆便斷為寒必須以兼證參之方知端的如手厥逆兼以復滿泄利清白小便亦清口不渴惡寒戰栗面如刀刮皆寒證也若腹滿後重泄利稠黏小便亦澀渴而好飲皆熱證也宜詳審之結胸解結胸之證嘗見世俗不問曾下與否但見心胸滿悶便呼結胸而與桔梗湯治之蓋本朱奉議之說也有頻頻與之反成真結胸者殊不知結胸乃下早而成未經下者非結胸也乃表邪傳至胸中未入於腑證雖滿悶尚為在表正屬少陽部分只宜小柴胡加枳殼以治如未效則本方對小陷胸湯一服豁然其效如神但祕之不與俗人言耳若因下之而成者方用陷胸湯凡丸分淺深而治之不宜太峻蓋上焦乃清道至高之分若過卜則傷元氣陷胸湯丸宜從緩而治這嘗讀仲景傷寒論結胸條之病發於陽而反下之熱入因作結胸病發於陰而反下之因作痞所以成結胸者以下早故也成氏注釋曰發熱惡寒者發於陽也無熱惡寒者發於陰也再三熟玩不能不致疑其間蓋無熱惡寒者寒邪直中陰經真陰證也非陽經傳至陰經之病若誤下之不死即巳危矣豈可以瀉心湯熱相參之藥治之而愈乎豈反輕如結胸乎詳此恐言當衛陰陽也風屬陽陽邪傷衛頭痛發熱微盜汗出反惡寒者當服桂枝湯止汗散邪醫者不達而不之衛氣重傷胸中結硬經又云結胸脈浮大者不可下下之即死結胸證悉具而煩躁者亦死蓋衛出上焦清道受傷不重也故也用陷湯峻利之藥下之寒者陰陰邪傷營當以麻黃髮表誤下之而成痞滿者宜瀉以理痞蓋營出中焦黃連能瀉心下之痞邪陷於膈不犯清道則元氣不傷故輕於結胸耳若陰經自中之寒以瀉心理之而可愈吾不信也傷寒合病並病論趙嗣真曰吾嘗疑合病並病之難明也久矣因始釋之合病者二陽經或三陽經同受病受病病之不傳者也並病者一陽先病又過一經病之傳者也且如太陽陽明並病一證若並而未盡是傳未過尚有表證仲景所謂太陽未罷面色赤陽氣費怫鬱在表不得越煩躁短氣是也又當汗之麻黃湯桂枝各半湯若並之已盡是傳過仲景所謂太陽證罷潮熱手足汗出大便硬而有譫語者是也法當下之以承氣湯是知傳則入腑不傳則不人腑所以仲景論太陽陽明合病止出三證如前論太陽明明並病則病則言其有傳變如此三陽互相合病皆自下利仲景太陽陽明合病主以黃芩湯少陽陽明合病主以承氣湯至於太陽少陽並病其證頭痛強痛眩冒如結胸心下痞便當刺大椎肺輸肝輸不可汗下太陽陽明並病已見上論但三陽合病仲景無北景強惡寒語句雖別有口燥渴心煩背微惡寒者乃屬太陽證而非三陽合病也三陽若與三陰合病即是兩感所以三陰無合病例也傷寒別名語無倫者曰譫語實則譫語也外語大便祕小便赤聲重曰鄭聲虛則鄭聲外語大小便利而手足冷也下泄曰轉矢氣大便堅小便利曰脾約大便如常曰清便自調或云自可水穀不化曰下利清穀傷寒十三日曰過經陰病發躁曰陰躁屬少陰手足逆冷曰厥在陰厥陽厥二證手足指頭微冷曰清屬二陰肌膚冷或下利而發躁無時暫安曰臟厥兩手無脈曰雙伏一手無脈曰單伏男子病新瘥而婦人與之交陰腫小腹絞痛者曰陽易女子病新瘥而男子與之交裡急腰胯連腹內痛者曰陰易冬應寒而反溫人暴感之而病者曰冬溫非時暴寒伏於少陰之經咽痛下利曰腎傷寒傷寒病二月至夏方發曰晚發發汗後身猶灼熱自汗曰風溫中暑曰中暍感不時之氣而病老幼皆相似者謂之天行即瘟疫也妄發濕溫汗者曰重暍重暍者不治汗後不為汗衰謂之陰陽交死證也熱煩身躁太陰寸口脈兩沖尚躁盛是陰陽交死得汗脈靜者生病瘥後發熱曰遺熱傷寒瘥後勞曰勞復傷寒瘥後食肉再病曰食復自亂無神氣曰無精吐利並作曰霍亂鼻出血曰衄熱病脈躁盛不得汗者曰陽極死證陰獨盛而陽暴絶曰陰毒陽獨盛而陰暴絶曰陽毒咳逆曰噦乾嘔曰啘陽明與少陰合病下利脈長大而弦者曰負死證也大便堅硬曰鞕溏曰鴨淡協欲飲水水入即吐曰水逆心振寒而動曰悸即怔忡之別名也心中若有所失曰懊憹強發少陰汗則動血或出口鼻或出耳目謂之下厥上竭不治身振搖而動曰肉瞤臍下有動氣曰奔豚病在上吐之曰湧病在下泄之曰利血曰營氣曰衛汗孔曰元府即腠理也手足搐搦曰瘛瘲二陽俱病曰合病先二陽俱病曰兩感又曰雙傳四肢病曰未疾厥而下利當不能食反能食者曰除中不治目中不明瞭曰目中不了了一曰病瘥皮膚頑而不知有無者曰不仁傷寒陽病下之早即為結胸按之即心下即心下痛為小結胸不按自痛連腹堅硬曰大結胸若飲水過多停結在胸肋間無大熱而頭微汗出者曰水結胸煩躁多而有結胸證曰熱實結胸無熱而有結胸證曰寒實結胸傷寒陰病下之早按之不痛胸中氣結曰痞氣傷過傷寒證似結胸飲食如常時時下利而舌上白胎者曰臟結不治傷寒後上唇有瘡蟲食其喉或食其臟早惑傷寒後下唇有瘡曰食其肛食其陰曰狐發熱汗不止曰漏風亦亡陽之別名也大下之後損陰傷血亦謂之亡陽太陽病桂枝症而投麻黃汗出多遂漏不止曰亡陽發狂證有因火劫驚狂謂之火邪其人亦曰亡陽大抵陰病不當有汗若反有汗者亦亡陽也傷寒發汗吐下溫針後及小柴胡湯證罷病不解曰壞證看犯何逆以法治之柴胡證仍有則不為逆凡逆有四種或變為溫瘧或變為風溫或為溫毒或為溫疫也熱病不知痛所在不能自收口乾渴甚陰頭有寒者熱在骨髓死不治熱病在腎今人渴口乾舌焦黃赤書夜欲飲不止腹大而脹尚不歇目無精光死不治
