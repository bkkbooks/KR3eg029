body:
  text: 卷下辨表分寒熱第一書夜頭疼渾不了先提清表分身熱脈浮邪在表病症看來似一般表寒表熱須分曉點出眉目或有汗無汗汗多少且莫管只就脈浮中分出兩此綿是最著眼處表寒浮緊或兼弦表熱浮數兮或兼滑表長與弦緩寒者身疼慣怕寒以上旁證之頻求衣被遮溫暖熱者雖然也畏風無風便欲開帷幔寒不渴兮熱或渴寒舌白苔熱黃澤寒者口和熱口苦寒減食兮熱能食表寒散以辛溫味表熱辛涼非一例表寒切勿先消食惟恐引邪入里去表熱切忌用辛溫變成燥熱為難治以治法為收束辨表分虛寒虛熱第二頭痛表也脈浮或兼大兼弦或兼數兼弦按無力虛也表分虛同寒熱別表若虛寒必惡寒若進辛溫汗難出若用辛涼必致汗多而近於亡陽矣此下言服辛溫之後變象氣擾翻教身體麻或大熱兮或微熱胸前微滿且欲嘔口淡或渴或不渴表如虛熱口亦淡必兼微渴思潤澤服過辛涼身反痛此下是服辛涼後變象舌形定現微苔色不論大汗與無汗但查熱勢加猖獗兩症皆須補益來寒加薑桂宜用桂枝湯加耆術甚則加人參干炮薑之類如血虛無汗加當歸紅花和其陰血熱芩柴宜柴芩歸芍耆朮之類甚則加人參辨裡寒第三裡寒脈沉緊或兼緩與遲惡寒骨節痛五字是表證表症似而非胸腹滿痛且欲嘔或吐或利俱有諸或熱或不熱手足指冷厥喉有冷涎苔白滑或如豬腰或茶褐此宜桂枝湯去芍加乾薑裡寒溫補是良方甚則加桂附可以復其陽辨裡熱第四裡熱脈沉主腦數或緩滑以長無論其神昏與清無認其身熱與涼唇焦齒黑讝語現舌短苔黑或起芒裂破出血反不渴飲冷小溲長或利清水或便鞭聲音洪厲力氣強狂發登高棄衣走否且循衣而模床面目或或不赤其色垢即不赤亦面垢濁如薰黃此宜芩連石膏類甚則芒硝與大黃辨裡虛寒第五里若虛寒者脈必沉而緩主腦微細按無神救之惟愁晚手足常四逆面色青黑黯渴而不欲飲但覺口中淡惟喜極熱湯稍解胸中滿或嘔或吐或下利或不便心下悸心煩喜躁不思食踡臥恍惚每獨語舌帶淡墨色或如豬腰或糙米或白苔而潤或無苔而燥短縮不能伸望之萎且稿理中四逆急溫之否則神昏汗脫了辨裡虛熱第六欲知裡虛熱脈沉而數按無力主腦身熱退不淨口渴神恍惚與湯測飲之不與亦不討有思食來食到便先飽舌上略覺燥得湯燥即好或有微苔或無苔或淡紅色淡紅色香岩行生用炙甘草湯謂津傷而氣無化液也不可用寒涼藥如桃腮此為里分少津液瀉心導赤佐生脈辨假虛寒第七實熱內伏也脈沉細兮或緩長出則遲兮入則疾主腦或伏筋骨按有力沉實也本宜下口中不渴舌燥短邪入營往往不渴四逆謂熱深厥亦深不但身涼且四逆神昏讝語口目動狀若驚風作痙厥或利清水熱瀉可不便解下或如爛桃色人事不知歌且哭身輕偏自能起立大證據或吐蛔蟲口舌苦辣小便行時長且赤此是虛寒假證現應須解毒和涼膈辨假實熱第八虛陽上浮也脈浮而大或洪數無奈按之全不見主腦任他熱勞如燎原浮大洪數卻是熱象按之不見全是虛證然邪盛之脈亦有按之不見教師不可不慎也真底實板已先現苔白或黑短不燥或如豬腰或米糙而目俱赤為戴陽譫語發狂手足躁或有汗兮或無汗從臥只求並中蹈舌腫唇齒出血渴飲湯水常不絶內是真寒外假理中八味合生脈煎成冷飲代茶湯庶幾虛火歸源得誤服芩連增躁渴變成死證庸醫到此休饒舌辨渴第九渴症須分寒與熱熱者脈數而口舌主腦身熱汗出喜冷飲或兼湯下百杯可大證據此宜花粉與川連加味參同伴白虎虛寒而渴者脈必細兼遲即教洪且大終是數而虛主腦渴喜極熱湯稍溫便嫌冷有時思得水大證據仍復不能飲此宜生脈中薑附辛以潤又有汗下之後亡津液生津之品始為得不宜涼藥不宜溫生津為主何況諸多辛與熱此非口渴乃口乾濁屬實熱干為虧當生津如酸甘化陰之類辨舌第十胃氣現於舌上有淡白苔俗醫漫消食必致光無胎調理到思食苔白漸生來君不見病有厚苔厚苔滿舌者忽然退去光而燥乃為胃氣絶之症從此參詳便分曉又有大紅舌無苔者君火色浮於外盛極將衰欲化灰無病之人亦常有之宜用附子引火歸源才得退舌色純紅必腎氣素虛之人無他症而忽現此舌者附子引火歸源固合又若敖氏傷寒金鐿載純紅為將瘟舌乃熱蓄於內而病將發也不問何經宜用透頂清神散搐鼻法亦不可不知又有舌黑如淡墨更不須問燥與濕總歸腎水克心火陰盛陽衰須早識除非黑起芒刺燥而制陽熱結何消説辨虛寒舌燥第十一舌燥有多般或淡黃或淡白或起微刺或灰色更有望之如燥捫之澤望之燥捫之澤溫證論言舌絳望之似燥手捫之原有津液此津虧濕熱薰蒸將成濁痰蒙閉心胞也其色或紫而或黑必兼吐利而厥逆神昏譫語詞謇澀舌燥而語言不清因燥而不清可治舌黑而語言不清所謂口雖欲言舌不得前死證也脈形微細定如絲或雖洪大終無力虛寒定案急用生脈以養津附薑芩草和耆朮俗醫為五味味厚多則用十餘粒少則七八粒此不通之論必須錢餘方效辨實熱舌燥第十二實熱舌燥先有地或黃或黑起芒刺溫證論凡舌不拘何色生芒刺者皆是上焦熱極也常用青布拭冷薄荷水揩之即去者輕旋生者險即使苔輕偏破裂必兼身熱焦唇齒渴喜飲冷麵目赤並無吐利與厥逆讝語便閉諸症現洪數滑長脈可驗白虎承氣隨變換隨症變換也辨寒頭痛第十三寒頭痛脈浮而緊主腦或弦或沉更兼遲惡風與寒四肢冷大證據頭喜熱物包里之更有劉河間論頭痛屬熱者亦惡寒喜熱緣熱為寒閉則其痛甚熱氣流通則痛止也然上後必復作而益甚為驗脈亦必有異理中參人桂天麻附子細辛重者加少佐羌防法亦佳辨熱頭痛第十四熱頭痛脈浮而數或滑而長亦有諸口苦舌乾渴欲飲痛連風府與風池惡熱其常惡風暫此為風熱症已顯羌防柴葛連翹芩甚則石膏用之驗辨虛頭痛第十五虛頭痛脈弦而大弦則為寒大則虛主腦痛極不堪喜得按日夜呼叫語聲嘶大證據其痛或專在額上遍頭皆痛亦有之急宜參芩者術加附子此症失治危即死辨風寒骨痛第十六風寒骨痛脈弦緊主腦或遲而緩亦有淮身熱惡寒手足冷大證據舌上白苔口不渴拘攣偏體痠難忍甚則上嘔下利並桂枝湯內手天麻有濕去芍加附穩辨虛骨痛第十七脈弦而大數無力主腦或發熱兮或不熱惡同兮拘急口淡兮神思恍惚大證據痛在骨節兮服發散藥而痛愈劇此神氣傷也合用桂枝與耆術大凡人身諸骨節其數三百有六十是神氣之所遊行而出入君不見仲景新加湯重用參薑以復陽桂枝湯加參薑辨虛寒腹滿第十八臟寒生滿出內經病脈遲緩兮或沉緊可虛大兮按無力腹滿時減又甚不欲食兮食即嘔或泄瀉惡寒兮而渴喜熱飲薑桂香砂溫散之不應再加參朮耆辨實熱腹滿第十九脈沉而實主腦兮或滑與長兼腹滿證據不減兮減亦不足言二句出金匱大便雖解而不暢兮或得解而少寬滿腹硬痛不可按兮無吐暈等虛症之相參此宜枳朴以消之甚則加大黃參其間辨虛寒不大便第二十大便不通群呼熱不知寒凝亦斂結腹不滿兮不渴穎案白滑胎兮弦緊脈定案上屬虛寒無浪攻照常飲食切不可飢且從容遲之一二十日後溫補足時氣自通辨實熱不大便第二十一脈數有力長滑甚煩渴腹滿按之硬或潮熱兮食即脹時有濁氣從後並此為胃熱宜下之凡服下藥燥糞已來又得溏泄此已解也如服下藥但利清水一二次又無燥屎痞滿如故此未解也再當下之如服下藥二三次仍不通者此腸胃枯澀也當下取之取之而不通者死一有虛症須綱審大約實症一下即愈一有虛症便須細審即必當下者亦中用涼隔以微利之解毒以和之陶氏黃龍湯以補而下之陶節庵黃龍湯即大承氣湯加參歸草桔薑棗辨小便不通第二十二小便不通分虛實虛則三焦失其職屢經利水不相合此宜金匱腎氣丸治其三焦決瀆官象牙生煎服亦安實者人素強或好食熱物肺熱不能通水道以致膀胱成熱結宜用豬芩澤瀉梔滑石用後仍不效須向膀胱尋外竅經説毫毛是其應經曰三焦膀胱才腠理毫毛其應是三焦主腠理膀胱主毫毛膀胱有出竅而無入竅濟泌別汁而滲入膀胱者也毫毛是其外竅譬如水注塞其上竅則水不能出矣如人不虛利小水而仍不通者宜發其汗外竅通而內竅亦通此所謂開鬼門也改從發汗最為妙又有動其胞中血虛寒實熱隨症別虛寒便溫補熱則而養血因症施方不可執辨嘔第二十三其人受暴寒審問或食生冷物吐酸證據並乾嘔平胃正氣合脈滑主腦胃有餘飲冷不喜熱證據服溫熱藥嘔愈甚黃連竹茹佐薑汁溫熱症肺胃不和每有嘔吐用黃連四分蘇葉五分泡湯吃即止兼虛參以參加入脈或虛大數主腦無力嘔吐清涎虛寒嘔證據及冷沫胃虛不能容穀食聞食即哎胃陽竭矣食反出人參理中最為良丁得附子加亦得脈滑有力主腦症不虛胸滿按之痛證據愈劇全合用朴實與二陳此謂中焦之嘔東垣語從乎積辨吐蛔第二十四熱厥吐蛔蛔必多凡屬吐蛔無論熱與寒切忌涼藥人情清楚脈形和隨生隨吐無煩燥瀉其濕熱勿蹉跎厥陰傷寒屬風木吐蟲兼吐水清緣手足厥冷主腦煩躁甚烏梅丸義君須讀辨汗第二十五虛汗須分陰與陽最虛凡服發汗藥不可太過過則反致陽虛如服一劑無汗再作湯與之後無汗此營衛乏絶法當義陰轉正而再汗之三治無汗者死自汗補其衛其人素虛或勞傷或大病後腠理虛陽不能衛外而為固則自汗宜用參者五味芩術甚則加桂附如乾薑半夏陳皮開達之工皆不可用盜汗歸之陰氣虛參甘歸地從其類人臥則血歸於肝陰虛而不能為守則盜汗宜參芩耆術五味歸芍生熟地之類惟有陰明邪並來熱氣薰蒸毛竅開汗出溱溱常不止但宜涼解得和諧汗有心家血液之汗太陽津液之汗俱不可出惟陽明水穀陽明水穀之汗雖出無害故陽症傷寒熱氣薰蒸毛竅開發溱溱而自出亦猶滾湯盛於器中熱氣上蒸而外濕也若汗不出熱氣不得泄必鬱而發黃即宜用清涼以解其熱而汗自水必用止汗之藥更有傷寒病久無汗出大劑參耆柴桂合頓然出汗退其熱景嶽書中亦曾説辨讝語第二十六讝語是多言皆因胃液干就中讝語有實象讝字從嚴侃侃然旋轉風輪難自主才呼四便張三鄭聲氣短神蕭索鄭聲者聲如鄭衛之音不能正也孔子曰惡鄭聲之亂雅樂經曰虛則鄭聲蓋因汗下過多表裡虛竭以致陽脫陰勝其人正氣衰而本音失精神奪而語句重手足並冷神昏舌短音響模糊與譫語迥不相同此症十無一治不得巳姑與獨參湯或白通湯鄭重頻煩不厭復一樣逢人講話多不曾説南又道北設使讝語鄭大半屬無稽是則名為妄虛實皆有之若夫似睡非睡間隱隱約約如交談此為獨語未全亂各從脈症細詳參辨面目赤第二十七面目赤有三須從脈症參陽氣鬱於表辛涼可散焉裡熱薰於上白虎及黃連無根火外浮盯是內真寒八味生脈煎冷飲假對假兮古所傳辨下利第二十八下清穀者為虛寒下清水者為實熱惟在膿血稀溏和汁沫此三件中細詳別假如作嘔不食兮腹痛喜按心恍惚而煩兮或動悸與頭眩燥而不欲飲兮頭眩耳鳴而口淡後重逼迫兮既解而仍不減脈弦數而虛大兮皆虛寒之外現苟脈症之反是兮即實熱之證驗辨厥第二十九手足冷時為四逆厥才其冷過肘膝仲景傷寒俱禁汗無論陽厥與陰厥陽厥是傳經病自三陽迸入陰熱極必兼勝化行還有始熱終寒因藥誤也能轉入陰寒路執定傳經亦是錯陰厥是直中喻氏中寒論當誦寒邪斬關直入來急救直陰休夢夢還怕熱邪深入血頓然厥冷身無熱君不見吞痧樣子忌熱湯不比中寒一例説總之脈症要詳參莖草拈來生殺間陰厥譫渴陰吐涎陰者身輕陰者踡復看其人唇爪甲青紫為熱青黑寒又有痰厥食厥和尸厥病久陰陽二氣虛亦厥各等各樣在淮繩步步須求脈症合辨腹痛第三十腹痛是虛喜揉按虛者必寒病涉陰脈遲緩兮或虛大諸多虛象察其因理中桂附可施行熱者面黃澤加以長滑脈宜用黃連苦清熱少佐薑萸亦相得治脾寒泄瀉腹痛仿仲景溫下之法先去其滯而後調補勿畏虛以養病更有欲嘔不嘔腹痛多寒熱其如錯雜何黃連湯內乾薑桂好共參甘兩下和食痛應消食凡治傷寒須按其腹痛與不痛硬與不硬若腹中痛與硬者此燥屎也臍下硬而痛者此燥屎與蓄血也臍下築築然痛上衝於心者此奔豚氣也腹中氣響下趨者欲作瀉也燥也燥屎者小便不利而臍下如疙瘩狀蓄血者小便利而臍下如懷孕狀難在虛寒兼仿積學士溫脾法可宗許學士有溫脾湯見本事方許叔微溫脾湯乾薑肉桂心熟附子炙甘草枳實厚朴大黃化為煎法尤慰貼有虛寒之人患腹痛服溫補藥而相安時止時作痛仍不解甚則清水或白沫此虛中有實或先有宿食在腸不曾去或病中腸胃虛不能運化所食之物停於腸中即一二塊宿糞亦能作楚宜用溫補藥煎好去渣人大黃一錢不甚虛者可加一錢五分滾四五沸服之宿食自下正氣不傷而病隨愈此屢試屢驗之妙法也蟲痛面黃吐涎沫食酸即安甜即劇虛實寒熱要分曉殺蟲方中求配合氣痛因郁惱心運脘與兩病久人必虛滋補兼疏郁痛不可近者按之濡軟為蓄血不比硬滿為熱結重則桃仁承氣湯輕者宣通微下奪別有吞痧現濕熱薰蒸邪變幻急刺委中出血良磨服玉樞丹亦善最怕是三陰寒症認為痧不飲溫湯飲冷茶亂進丹丸並放刮臨危空自悔前差辨脈脫第三十一六脈俱脫者大命垂危矣神昏脈脫者死神清脈脫者亦者通脈四逆急服之仲景四逆湯中薑附草三陰厥逆太陽沉或益蔥薑參芍桔通陰復脈力能任還怕脈因暴出死但得脈來微續生更需附子四五枚人參小半周時服盡休間斷隨進米粥始回春參力偶不繼前功必盡棄平時無學力到此滋疑懼每見虛寒之極服溫補躁亂不寧換陽也嘔且吐此為藥力尚未全切莫心疑換別路大約三陰病症露危劇急則六日三日緩則行期十二日幸而君火未全衰反見舌乾等症出更須薑附助其陽漸得陰回舌生液景嶽六味回陰飲又增地歸薑附草人參諸虛則甚陰陽脫此劑扶危力可任四味回陽用理中以術易附力加雄元虛虛脫垂危頃溫服徐徐定有功若見舌乾投涼劑壞切戒切戒乃百年人壽事起手果然認行真斷不朝三與暮四君不見景嶽全書用法精十補一清巧相濟又不見嘉言寓意重叮寧陰症轉陰必自愈濟困扶顛道在斯一有遊移去更有虛寒服藥來溫補不安涼適意兩寒相得從其類正氣敗壞決不治至於實熱失汗下脈伏似脫君休怕大承十棗用即安神氣分明現真假須知實熱治可緩涼瀉一投撥便轉不比虛寒救濟難仁術全馮思與辨司天在泉歌子午少陰君火天陰明燥金應在泉丑未太陰太陰治寅審少陰厥聊卯酉劫與子午倒辰戍巳亥亦皆然每歲天泉四間氣上下分統各半年卯酉與子午倒辰戍與丑未倒巳亥與寅申倒子午年少陰君火司天陽明燥金在泉丑未年太陰濕土司天太陰寒水在泉寅申年少陰相火司天厥陰風木在泉卯酉年陽明燥金司天少陰君火在泉辰戍年太陽寒水司天太陰土在泉巳亥厥陰風木司天少陰相火在泉
