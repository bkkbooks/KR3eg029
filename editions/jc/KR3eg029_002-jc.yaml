body:
  text: 卷中濕熱論濕熱症始惡寒後但熱不寒汗出胸痞舌白或黃口渴不引飲此條乃氣虛則病入太陰病在二經之表者多兼少陽三焦病在二經之裡者每兼厥陰風木以少陽厥陰同司相火陽明太陰濕鬱生熱甚則少火皆成狀火而表裡上下充斥肆逆故最易耳襲乾嘔發痙發厥而提綱中不言及者因以上諸症皆濕熱兼見之變局而非濕熱病必見之正局也始惡寒者陽為濕遏而惡寒終非若寒傷於表之惡寒後但熱不寒則鬱而成熱反惡熱矣熱甚陽明則汗出濕蔽清陽則胸痞濕邪內盛則舌白濕熱交蒸則苔黃則液不升而口渴濕則飲內留而不引飲然所云表者乃太陰陽明之表而非太陽之表太陰之表四肢也陽明之有肌肉也胸中也故胸痞為濕熱必有之證四肢倦怠肌肉煩疼亦必並見其所以不幹太陽者以太陽為寒水之腑主一身之表風寒必自表入故屬太陽濕熱不盡從表入故不必由太陽況風寒傷營衛營衛乃太陽所司表濕傷肌肉為陽明所主寒濕之屬太陽者以太陽為寒水同氣相求也濕熱之屬陽明者陽明為中土火化從陽也濕熱之邪從表傷者十之一二由口鼻入者十之八九陽明為水穀之海太陰太陰乃濕土之臟故多由陽明太陰受病膜原者外通肌肉近胃腑即三焦之門戶而實一身之半表半裡也邪由上受直趨中道故病亦多歸膜原要知濕熱之病不獨與傷寒不同且與溫病大異溫病乃太陽少陰同病而提綱中反不言及脈者以濕熱之症脈無定體或洪或緩或伏或細各隨症見不拘一格故難以一定之脈拘定後人眼目也濕熱之病陽明必兼太陰者人徒知臟腑相連濕土同氣而不特此也當與溫病之必兼少陰此例少險不藏木火內燔風邪外襲表裡相煸故為溫病太陰內傷濕飲停聚客邪再至內外相引故病濕熱此皆先有內傷再感客邪非由腑及臟之謂若濕熱之症不挾內傷中氣實者其病必微或先因於濕再因飢勞役而病者亦屬內傷挾濕標本同病然勞倦傷脾為不足濕飲停積為有餘所以內傷外感孰多孰少孰實孰虛又在治病者之臨症時權衡矣濕熱症惡寒無汗身重頭痛濕在表分宜藿香薷羌活蒼朮薄荷牛蒡子等味頭不痛者去羌活身重惡寒濕遏衛陽之表症頭痛必挾風邪故加羌活不獨勝濕用以祛風此條乃陰濕傷表之候濕熱症汗出惡寒發熱身重關節疼痛濕在肌肉不為汗解宜滑石豆黃卷芩皮蒼朮皮藿香葉鮮荷葉通草桔梗等味不惡寒者去蒼朮皮此條外候與上條頗同惟出汗獨異更加關節疼痛乃濕邪初犯陽明之表故略見惡寒及至發熱惡寒當自罷矣用藥通陽明之表而即清胃脘之熱者不欲濕邪之鬱熱上蒸而欲濕邪之淡滲下走耳此條乃陽濕傷表之候濕熱症三四日即口噤四肢牽引拘急甚則角弓反張濕熱侵入經絡脈隧中宜鮮地龍秦艽威零仙滑石巷耳子絲瓜藤酒炒川連等味此條乃濕邪挾風邪者為木氣風動則木張乘入陽明之絡則口噤走竄太陰之經則拘攣故用藥不獨勝濕重用熄風一則風藥能勝濕一則風藥能疏肝也選用地龍諸藤者欲其宣通絡脈耳或問仲景治痙原有桂枝湯加括蔞根及葛根湯二方後人屏而不用豈宜於古者不宜於今即今之痙者與厥相連仲景不言及厥豈金匱有遺文耶余曰非也藥因病源既異治法自殊故同一發痙而傷寒與濕熱之病因不同傷寒之痙自外來症屬太陽治以散以外邪為主濕熱之痙自內出波及太陽治以熄內風為主蓋三焦與肝膽同司相火中焦濕熱不解則熱甚於里而少火悉成壯火火動則風生而筋攣脈急風煸則火熾而熾亂神迷身中之氣隨風火上炎而有升無降常度盡失由是而形若屍厥正內經所謂血之與氣並走於上則為暴厥者是也外竄經脈則成痙內並膽中則為厥內外充斥痙厥並見正氣猶存一線則氣復返而生胃津不克支持則厥不回而死矣所以痙之與厥往往相連傷寒之痙自處來者安有是哉暑月痙症與霍亂同出一源風自火生火隨風轉乘入陽明則嘔賊及太陰則瀉名霍亂竄入筋中則攣邪勢愈甚不免逼亂無厥者痙則風火閉鬱郁則邪勢愈甚不免逼亂神明故多厥霍亂則風火外泄泄則邪勢外解不致循經內走故少厥此痙與霍亂之分別也然痙症邪滯三焦三焦乃火化風得火而愈煽則逼入膽中而暴厥霍亂邪走脾胃脾胃乃濕化邪因濕而停留則淫及諸筋而拘攣火鬱則厥火竄則攣又痙與霍亂之遺禍也痙之攣急乃濕熱生風霍亂之轉筋乃風來勝濕痙則由經及臟而厥霍亂則由臟則由臟及經而攣總由濕熱與風淆亂清濁升降失常之故夫濕多熱少則風入土中而霍亂熱多濕少則風乘三焦而痙厥厥而不反者死胃液乾枯火邪盤踞也轉筋入腹者死津液內涸風邪獨勁也然則胃中之津液關係顧不鉅哉厥症用辛泄胸中無形之邪也乾霍亂用探吐泄胃中有形之邪也然泄邪而胃液不上升者熱邪益熾探吐胃液不四布者內邪益攻終成成候不可不知濕熱症壯熱口渴舌黃或焦紅髮痙神昏讝語或笑邪灼心胞營血已耗宜犀角連翹羚羊生地元參銀花露鉤藤鮮菖蒲至寶丹等味上條言痙此條言厥濕邪暑邪本傷陽氣及至熱極逼人營陰則津液液耗而陰亦病心胞受灼神熾昏亂用藥以清熱救陰泄邪平肝為務濕熱症發痙神昏笑妄脈洪數有力開泄不效者濕熱蘊結胸膈宜涼膈散若大便數日不通者熱邪閉結腸胃宜仿承氣微下之例此條系陽明實熱或上結或下結清熱泄邪只能散絡中流走之熱而不除膈中蘊結之邪胡陽明為出路也濕熱症熱煩渴舌焦紅或縮癍疹胸痞自利神昏痙厥熱邪充斥表裡三焦宜大劑犀角羚羊角生地元參銀花露紫草方諸水金針鮮菖蒲等味此條乃痙厥症之最重者上為胸痞下挾熱痢癍疹痙厥陰陽舌困獨以清陽明之救陽明之液為急務者恐胃液不存其人必自焚而死也濕熱症寒縶如瘧濕熱阻遏膜原宜柴原厚朴檳榔草果藿香六一散蒼朮半夏石菖蒲等味瘧由暑熱內伏秋涼外束而成若夏月腠理大開毛竅疏通安得成瘧而寒熱有定期如瘧之發作者以膜原為陽明之半表半裡濕熱阻遏則營衛氣爭症難雖不得與瘧同治故放吳又可達原飲之例蓋一由外涼束表一由內濕阻遏也濕熱症數日後脘中微悶知飢不食濕邪蒙繞上焦宜藿香葉薄荷葉鮮稻葉鮮荷葉枇杷葉佩蘭葉盧尖冬瓜仁等味此濕熱巳解餘邪蒙閉清陽胃氣不輸宜用極輕清之品以宣上焦陽氣若投味重之劑是與病情不相值矣濕熱初起亦有脘悶懊憹汗出口渴眼欲閉時讝語濁邪矇蔽清陽屬在上焦者宜用枳殼桔梗淡豆豉生山梔湧泄法若投投輕清劑又與病情不相當矣說須與第九第十兩條參看同一邪在上焦而第九條屬虛此說屬實且同一實症而第十條邪在中焦此說邪在上焦臨症者當慎之濕熱症初起發熱汗出胸痞口渴舌白濕伏中焦宜藿香蔻仁杏仁枳殼桔梗鬱金蒼朮厚朴草果半夏石菖蒲六一散佩蘭葉等味濁邪上干則胸痞胃液不升則口渴病在中焦氣分故多開中焦氣分之藥此條多有挾食者宜加瓜蔞查肉菔子舌根現黃色即是挾食症濕熱症數日後自利溺赤口渴濕流下焦宜滑石豬茯芩澤瀉萆薢通草等味下焦屬陰所司陰道虛故自利化源滯則溺赤脾不轉津則口渴然必不引飲太陰濕故也濕滯下焦故獨以分利為治此條藥味獨用分利症兼口渴胸痞須佐入桔梗杏仁豆捲開泄中上源清則流自潔矣不可不知以上三條皆濕重熱輕之候濕熱之邪不自表而入故無表裡可分而未嘗無三焦可辨猶之河間治消渴以三焦分者是也夫熱為天之氣濕為地之氣熱得濕而熱愈熾濕得熱而濕愈橫濕熱兩分其病輕而緩濕熱交合其病重而速濕多熱少則蒙上流下當三焦分治若濕熱俱多則下閉上壅而三焦俱病矣猶之傷寒門二陽合病三陽合病是也太陰濕化三焦火化有濕無熱止能蒙閉清陽或阻於上或阻於中或阻於下濕熱一合則身中少火悉化壯火而三焦相火有不皆起而為暴者哉所以上下充斥內外煎熬最為酷烈兼之木火同氣表裡分司再引肝內痙厥立至胃中津液幾何其能供此交徵乎至其所以必屬陽明者以陽明為水穀之海鼻食氣口食味悉歸陽明邪從口鼻而入則陰明為必由之道路也其始也邪入陽明早已先傷其胃液其繼也邪盛三焦更欲取資於胃液司命者可不為陽明顧慮哉可問木火同氣熱甚生風以致痙厥理固然矣然有濕熱之症表裡極熱不痙不厥者何也余曰風木為火熱引動原因木氣素旺肝陰先虧內外相引兩陽相煽因而勁張若肝腎素優並無裡熱者火熱者火安能招引肝風哉試觀小兒一經壯熱便成瘛從以純陽之體陰氣未足故肝風易動也濕熱症舌遍體白口渴濕滯陽明宜用辛如厚朴半夏草果乾菖薄等味此濕邪極盛邪尚未蘊結故重用辛以開之使上焦得通津液得下也濕熱症舌根白舌尖紅濕漸化熱余濕猶滯宜用辛泄佐以清熱宜蔻仁半夏干菖蒲豆卷六一散連翹錄豆殼等味此濕熱參半之證而燥濕之中即佐清熱者赤所以存陽明之液也上二條憑驗舌以投劑極為臨症時要訣蓋舌為心之外候濁邪上薰心肺舌肺因而轉移濕熱症初起即胸悶不知人瞀亂大叫痛濕熱阻閉中上二焦宜草果檳榔鮮菖蒲六一散芫荽各重用或加角末地漿水煎服此條濕熱俱重之候而去濕藥多清熱藥少者以病邪初起即閉正未有傷故以辛通散邪為急務不欲以寒涼凝滯病機也濕熱症四五日口大渴胸悶欲絕乾嘔不止脈細數舌光如鏡胃液胃液受劫膽火上衝宜西瓜白汁金汁鮮生地汁甘蔗汁痞悶再磨鬱金木香烏藥香附等味此營陰素虧木火素旺者今木乘陽明而耗其津液然幸無飲邪故一清陽明之熱一散少陽之邪不用煎者取其氣之全耳濕熱症嘔吐清水或痰多黏膩濕熱內留水火上逆宜濕膽湯加瓜蔞碧玉散等味此素有痰飲而陽明少陽同病故一以滌飲一以降逆與上條嘔同而治異正當合參濕熱症嘔惡不止書夜不瘥欲死者肺胃不和胃熱移肺肺不受邪也宜用川連三四分蘇葉二三分兩味煎湯呷下即止肺胃不和最易致嘔蓋胃熱移肺肺不受邪不定還歸於胃嘔惡不止若以治肝膽之嘔治之誤矣故必用川連以清濕熱蘇葉以通肺胃則投之立愈以肺胃之氣非蘇葉不能通也數輕者以輕劑能治上焦之疾故耳濕熱症咳嗽書夜不寧甚至喘而不得眠者暑邪入於肺絡宜葶藶子六一散枇杷葉等味人知暑傷肺氣則氣虛不知暑滯肺絡者則肺實葶藶引滑石直瀉邪則病自除矣濕熱症十餘日後大勢已退惟口渴汗出骨節疼隱痛不已餘邪留滯經絡宜元米湯泡於朮隔一宿去朮煎飲之病後濕邪未盡陰液已傷故口渴身疼此時救則助濕治濕則劫陰宗仲景麻沸湯之法取氣不取味走陽不走陰佐以元米湯養陰逐濕兩擅其長也濕熱症數日後汗出熱不除或痙忽頭痛不止者營液大耗厥陽風火上升宜羚羊角蔓荊子鉤藤元參生地女貞等味濕熱傷營肝火化風上逆血不營筋而痙作上升巔頂則頭痛熱氣已退木氣獨張故痙而不厥投劑以熄風為標養險為本濕熱症胸痞發熱肌肉微痛始終無汗者暑邪伏於腠理內閉宜六一散一兩薄荷葉四五分泡湯調下即汗解濕熱發汗昔腎有禁此不微汗之病必不愈蓋既有不可汗這大戒復有得汗始解之治法臨症者當知所變矣濕熱症按法數日後忽吐下一時並至者中氣虧損升降悖逆宜生穀芽蓮心扁豆米仁半夏甘草伏芩等味甚極者用理中湯之意升降悖逆法當和中猶之霍亂之用六和湯也若太陰憊甚中氣不支非理中不可濕熱症十餘日後左關弦婁腹時痛時圊血肛門熱痛血液內燥熱邪傳入厥陰之陰宜仿白頭翁湯法熱入厥陰而下痢即不圊血亦當宗仲景治熱法若更逼入營陰安得不用白頭翁涼血而散邪乎設熱入陽明而下痢即不圊血又宜師仲景治下痢讝語用小承氣之法矣濕熱症十餘日後尺脈數下痢或咽痛口渴心煩下元不足熱邪直犯少陰之陰宜仿豬膚湯涼潤法同一下痢症有厥少之分則藥有寒涼之異然少陰有便膿血之候不可不細審也濕熱症身冷脈細汗胸痞口渴舌白濕中少陰之陰之陽宜人參白朮附子茯芩益智等味肥胖氣虛之人夏月多有是病濕邪傷陽理合扶陽逐濕口渴為少陰症焉得妄用寒涼耶暑月病初起但惡寒面黃口不渴神倦四肢懶脈沉弱腹痛下痢濕困太陰之陽宜仿縮脾飲冷香冷香飲子甚則大順散來復丹等法暑月為陰氣外泄陰液內耗之時故熱邪傷陰陽明灼爍宜清滋太陰告困濕濁迷漫宜溫宜散古法最詳醫者鑑諸濕熱症按法治之諸症皆退惟目瞑則驚悸夢惕餘邪內留膽氣不舒宜酒浸郁李仁薑汁炒棗仁豬膽皮等味滑可去著郁李仁性最滑脫古人治驚後肝系滯而不下始終目不瞑者用之以下肝系而去滯此濕熱之邪留於膽中膽為清靜之府藏而不瀉是以病去而內留之邪不去寐則陽氣行陰膽熱內擾肝魂不寧故用郁李仁以泄邪必用酒浸者酒入於胃先走於膽也棗仁之酸入肝安神而制以薑汁者安神而又兼散邪也用藥至此乃謂善於驅遺者也濕熱症曾開泄下奪者惡候皆平獨神思不清倦語不思食溺數唇齒乾胃氣不輸肺氣不元神大虧宜人參麥冬生穀芽川石斛木瓜生甘草鮮蓮子等味開泄下奪惡候皆平正亦大傷故見症多氣虛這象理合清補元氣若用泥滯陰藥去生便遠濕熱症四五日忽大汗出手足冷脈細如絲或絕口渴莖痛而起坐自如神清語亮乃汗出過多衛沖外之陽暫亡濕熱之邪仍結一時表裡不通脈故伏非真陽外脫也宜五芩散去朮加滑石酒淬川連生地耆皮等味此條脈症全似亡陽之候獨於舉動神氣中得其情噫此醫之所以貴識見也濕熱症發痙神昏獨足冷陰縮下體外受客寒仍宜從濕熱治只用辛溫之品煎湯薰洗陰縮為厥陰之外合之足冷全似虛寒矣乃諦觀本症無一屬虛姑知寒客下體一時營氣不達不但症非虛寒並非上熱下寒之可擬也仍從濕熱治之又何疑耶濕熱症初起壯熱口渴脘悶懊憹眼讝語濁邪蒙閉上焦宜湧泄用枳殼桔梗淡豆豉生山梔無汗加葛根若病退後皖中微悶知飢不食是餘邪蒙繞上焦法宜輕散此則濁邪蒙閉上焦故懊憹脘悶欲閉者肺氣不舒也時讝語者邪逼心胞也若投輕劑病必平除云高者越之用梔鼓湯湧泄之劑引胃脘之陽而開心胸之表邪從吐散一了百當何快如之濕熱症經水適來壯熱口渴讝語神昏胸腹痛或舌無胎脈滑數邪陷營分宜大劑犀角紫草茜根貫仲連翹銀花露鮮石菖蒲等味熱入血室不獨婦女男子亦有之不但涼血並須解毒然必重劑乃可奏功濕熱症上下失血或汗血毒邪深入營分走竄欲泄宜大劑犀角生地丹皮赤芍連翹紫草茜根銀花等味熱逼而至上下失血汗血勢極危而猶不即壞者以毒從血出生機在是大進涼血解毒之劑以救陰而泄邪邪解而血自止矣血止後須進參耆善後乃得濕熱症七八日口不渴聲不出與飲食亦不卻默默不語神熾昏迷進辛香涼泄芳香逐穢俱不效者邪入厥陰主客渾交宜仿吳又可三甲散醉地鱉蟲醋炒鱉甲土炒穿山甲生天蟲柴原桃仁泥等味暑濕雖傷陽氣然病久不解必及於陰陰陽兩困氣鈍血滯而暑濕不得外泄遂深入厥陰絡脈凝瘀使一陽不能萌動生氣有降無升無主阻遏零氣不通所以神熾不清而昏迷默默也用入厥陰之藥破滯通瘀斯絡脈通而邪得解矣濕熱症口渴胎黃起刺脈弦緩囊縮舌硬讝語昏不知人兩手搐搦津枯邪滯宜鮮生地盧根生首烏鮮稻根等味若脈有力大便不解者大黃加入亦可胃津劫奪熱邪內擾宜潤下以泄徒用清滋無當病情故仿承氣之例以甘涼易苦寒正恐胃氣受傷胃津不復故也
