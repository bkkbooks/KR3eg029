body:
  text: 卷上第一論濕病大概溫邪上受首先犯肺風從寒化屬陰故先受於足經風從熱化屬陽故先受於經逆傳心胞心肺最近邪盛傷營即傳心胞肺主氣屬衛心主血屬營辨營衛氣血雖與傷寒同若論治法則與傷寒大異傷寒由太陽而傳入他經當先辛溫發汗溫邪由肺入胃當先辛平解表蓋傷寒之邪留戀在表然後化熱入里溫邪則化熱最速未傳心胞邪尚在肺肺合皮毛而主氣故在表初用辛涼散解挾風加薄荷牛蒡之屬挾濕加盧根滑石之流或透風於熱外或滲濕於熱下不與熱相摶勢必孤矣不爾初當辛平解散若過涼遏邪邪反內走用溫發汗劫津化火風挾溫熱而燥生清竅必干謂水主之氣不能上榮兩陽風與熱也相劫也有陽虛氣不化液而燥治宜甘濕有積飲液不上升而燥治宜甘辛有陰液枯涸而乾燥治宜酸甘此風熱劫爍其津液治宜甘寒濕與溫合蒸鬱而蒙痹於上清竅為之壅塞濁邪害清也滲濕透熱佐以芳香其病有類傷寒驗之之法傷寒多有變症濕病雖久總在一經為辨第二論化熱入營前言辛涼散內甘淡驅濕若病仍不解是漸欲入營也由氣入營營分受熱則血液受劫心神不安夜甚無寐或斑點隱隱即撤去氣藥如從風熱陷入者用犀角竹葉之屬如從濕熱陷入者用犀角花露之品參入涼血清熱方中若加煩燥大便不通金汁亦或加入老年及平素有寒者以人中黃代之急速透斑為要若斑為要若斑出縶不解者胃津亡也主以甘寒重則玉女煎輕則梨皮蔗漿之類或其人腎水素虛病雖未及下焦每多先自彷徨驚疑恐懼之貌蓋腎水虛則生恐也此必驗之於舌如甘寒之中加入鹹寒滋養如生地元參龜版阿膠之類質絳而中心乾厚焦燥者生地阿膠龜版咖元明粉大黃以上之務在先安未受邪之地恐其陷入耳若其邪始終在氣分流連者可冀其轉汗透邪治宜益胃此法極難詳蓋汗由胃中水穀所化氣旺邪與汗相併而出如仲景服桂枝湯後啜稀粥者是也若胃虛發戰邪不能出反從內入也要在辨邪之淺深若邪已內人慾行此法反見助邪為害矣如風寒溫熱之邪初在表者可行若暑疫等邪受即在膜原而當胃口斷無益胃助邪雖虛人必先開達誤用即為害不淺也今邪與汗並熱達腠開邪開邪從汗出解後胃氣空虛當盧冷一書夜待氣還自溫暖如常矣蓋戰汗而解邪退正虛陽從汗泄故漸盧冷未必即成脫症此時宜安舒靜臥以養陽氣來復旁人切勿驚惶頻頻呼喚擾其元氣但診其脈若虛軟和緩雖倦臥不語汗出盧冷卻非脫症若脈急疾躁擾不臥盧冷汗出便為氣脫之症矣此正不勝邪內經言險陽交交者死也更有邪盛正虛不能一戰而解停一二日再戰汗而解者不可不知第三論邪留三焦氣病有不傳血分者邪留三焦猶之傷寒中少陽病也彼則和解表裡之半此則分消上下之勢隨症變法如近時杏樸芩等類或如溫膽湯之走泄因其仍在氣分猶有戰汗之門戶轉瘧之機括也不入營而傳心胞即傳於三焦蓋三焦主升降出入表裡之氣全賴三焦以出入法當轉其氣機雖溫邪不可用涼藥遏之故只宜辛平甘苦順其升降轉其氣機開透汗化瘧之門戶大凡看法衛之後方言氣衛行脈外營之後方言血營行脈中在衛必惡寒汗之可也宜辛平表散到氣不惡寒而惡熱小便色黃才宜清氣方可辛涼亦不可太涼反使邪不外達而內閉乍入營分脈數舌絳猶或透熱仍轉氣分而解開達即所以轉氣分如犀角元參羚羊等物是也至入於血舌深絳煩擾不寐或夜有囈語則恐耗血動血直須涼血散血如生地丹皮阿膠赤芍等物是也若不循緩急之法盧則動手便錯反致慌張矣且吾吳濕邪害人最多如面色白者須要顧其陽氣濕勝則陽微也如法應清涼用到十分之六七即不可過涼蓋恐濕熱一去陽亦衰微也陽虛者本多痰濕受寒濕非姜附術芩不能去受濕熱亦必黏滯難解須通陽明化濕過涼則濕閉而陽更困矣面色蒼者須要顧其津液清涼到十分之六七往往有熱減身寒者不可便云虛寒而投補劑陰虛者內火易動濕從火化易傷陰液陰傷則陽少依附但當和胃不可偏陰偏陽恐爐煙雖熄爐火猶存須細察精詳主可少少與之慎不可漫然而進也又有酒客里濕素盛外入里與之相摶在陽旺之軀胃濕恆多如身黃如橘子色而鮮明者此陽黃胃濕豕茵陳蒿湯在陰盛之體脾濕亦不少色如薰黃而沉晦者此陰黃辦濕用梔子柏皮湯或附子理中湯然其化熱則一熱病救陰猶易通陽最難救陰不在補血在養津與化汗津液虛則汗無由化養津則汗自出通陽一在溫而在利小便膀胱者州都之官津液藏焉氣化則自能出矣較之雜症有不同也第四論里結陽明三焦不從外解必致里結里結於在陽明辦與腸也無形之邪必依有形這物百摶結如痰滯濕是亦須用下法不可以氣血之分謂其不可下也不下勢必蒸爍傷陰惟傷寒熱邪在裡劫爍津液下之宜猛此多濕邪內摶下之宜輕如小陷胸湯黃連瀉心湯傷寒大便溏為邪已盡不可再下濕溫病大便溏為邪未盡必大便硬乃為無濕始不可再攻也再入之體脘在腹上其位居中按之痛或自痛或痞脹當用苦泄以其入腹近也必驗之於舌全舌苔之色或黃或濁濕與溫合蒸或與小陷胸湯或瀉心湯隨症治之若白不燥全是寒有痰濕或黃白相兼或灰白不渴皆陽不化邪陰濁凝阻慎不可亂投苦泄其中即胃中有外邪未解里先結者宜先通氣滯杏蔻橘桔之類或邪郁未伸素屬中冷者當加姜雖有脘中痞痛宜從開泄宣通氣滯以達歸於肺如近世這杏蔻橘桔等輕苦微辛具流動之品可耳又有舌上白苔黏膩口吐濁厚涎沫者其口必甜此為脾癉乃濕熱氣聚與穀氣相傳土有餘也盈滿則上泛當用佩蘭葉芳香辛散以逐以更當看其舌本紅赤為熱當清涼泄濁色淡不紅脾虛不能攝液而上泛當健脾降濁若舌上苔如鹼者胃中宿滯挾濁穢鬱伏當急急開泄否則閉結中焦不能從膜原達泄矣第五論白舌舌苔白厚而乾燥者此胃燥氣傷也白厚本是濁邪熱爍津傷濁結不化當先養津化濁滋潤藥中加甘草今甘守津還之意其人必素屬中虛故可用甘草舌白而薄者外感內寒也當疏散之若薄白而乾者肺液傷也加麥冬花露盧根汁等輕清之品為上者上之也肺位最高輕清乃得若重濁與肺無益而反傷及胃若苔白而質絳者濕遏熱伏當先泄透熱防其即干也此可勿憂再從里而透於外則變潤矣泄濕用辛開苦降濕泄自然熱透熱透自然舌乾再用苦辛甘涼從里透外則胃氣化而津液升舌即潤汗作而邪熱隨解初病即舌乾津液素虧神不昏者幸而未入心胞急宜養正微加透邪之藥若神已昏此內匱不可救藥矣第六論黃舌前云舌黃或濁當作陷胸瀉心須要有地之黃如草生地上必有根腳無根即為浮垢刮之即去若光滑者乃無形濕熱已有中虛之象大忌前法若妄行攻瀉必致表邪入里為結胸痞氣腹脹等症其臍以上為大腹或滿痛或脹不因藥誤病出自然此邪已入里表症必無或存十之一二亦須驗之於舌或黃甚或如沉香色或如灰黃色或老黃色或中有斷紋皆當下之如小承氣湯加檳榔青皮枳實元明紛生首烏等皆可若未現此等舌不宜用此等藥恐其中有濕聚太陰為滿或寒濕錯雜為痛或氣壅為脹皆有虛實寒熱總以利氣和氣為主又當以別法治之矣第七論薄黃舌黃苔不甚厚而滑者熱未傷津猶可清熱透表辛開透發從汗而解若雖薄黃苔不甚厚而津受傷也當以養津為主苦重之藥當禁宜甘寒輕劑以養之第八論絳舌熱邪傳營舌色必絳指舌本言絳深紅色也初傳舌色中兼黃白色指舌苔言此氣分之邪未盡也泄衛透營兩和可也仍從表解純絳鮮澤者言無舌苔胃無濁結邪已離衛入營胞絡受邪也宜犀牛鮮生地連翹鬱金石菖蒲等清泄之延這數日或其人平素心虛有痰必有舌苔但心血虛者舌質多不鮮明或淡晦無神邪陷多危而難治於此可卜吉凶外熱一陷里絡即閉非菖蒲鬱金等所以開須用牛黃丸至寶丹之類以開其閉若邪火盛而舌質赤宜牛黃丸虛而色淡晦者宜至寶丹以牛黃丸太寒故也恐其昏厥為痙也第九論燥絳舌舌絳而乾燥者火邪劫營涼血清血為要胃無濁邪則無厚苔邪熱入營則舌質色絳雖薄苔必黃又加乾燥則火邪劫營色絳而舌心乾者舌全絳心干乃心胃火燔劫奪津液即黃連石膏亦可加入其有舌心獨絳而乾者四連有苔或黃或白獨絳而干只在舌心亦胃熱而心營受灼也當於清胃中加入清心之品否則延及於尖為津干火盛之候矣舌尖獨絳而干熱止在心此心火炎和導示散瀉其腑若煩熱舌心干四邊色紅中心或黃或白者舌四邊紅而不絳中兼黃白而渴故知其熱不在血分此非血分也乃上焦氣熱爍津熱在氣分者必渴熱在血分者但口乾而不渴多飲能消水為渴不能多多飲但欲略潤為干如血分無熱而口乾者是陽氣虛不能生化津液宜辛潤如姜附之類急用涼膈散散其無形之熱再看傳變可也慎勿用血藥反致滋膩留邪至若舌絳望之若干手捫之原有津液此津虧濕熱薰蒸將成濁痰蒙閉心胞也胃以通絳為用濁降則清升而化津液熱邪入營鬱蒸胃中濁氣成痰反以蒙閉心胞即成錯厥當急疏其胃降濁以清營熱舌色絳而上有黏膩似苔非苔者中挾穢濁之氣急加芳香以逐之舌絳而抵齒難伸出者痰阻舌根有內風也內風上熾當開降中中辛涼咸潤以熄內內脾腎之脈皆連舌本亦有脾腎氣敗舌短不能伸出者其形貌面色必形枯瘁多為死證不獨風痰為患也舌絳光亮國陰亡也急用甘涼濡潤之品舌絳有碎點黃白者將生疳也大紅點者熱毒乘心也用黃連金汁有雖絳不鮮乾枯而痿者此腎陰涸也急以阿膠雞子地黃天冬等救之緩則恐涸而無救也第一論紫舌熱傳營血其人素有於傷宿血在胸中舌色必紫而暗捫之潮濕不幹故為於血當加散血之品如琥珀丹參桃仁丹皮等否則於血與熱相摶阻遏正氣遂變發狂之症若紫而腫大者乃酒毒衝心急加黃連紫而干晦者肝腎色泛也難治腎色黑肝色青黑相合而成紫晦故曰難治第十一論淡紅舌舌淡紅無色心脾氣血素虛或干而色不勞者乃胃津傷而氣無化液也當用炙甘草湯養血養氣以通經脈則邪自可去不可用寒涼藥第十二論芒刺舌凡舌不拘何色生芒刺者苔必焦黃或黑或無苔而絳若苔白或淡黃胃無大熱必無芒刺或兩邊有小赤瘰是營熱鬱結當開泄氣分是焦熱極者宜涼膈散散之皆上焦熱極也當用青布拭泠薄荷水揩之即去者輕旋生者險第十三論血跡腫大舌舌苔不燥自覺悶極者脾陽弱濁壅不行脾濕盛也雖有熱邪當先辛開泄濕而後清熱切不可先用寒涼遏閉或有傷痕血跡者當問曾經搔挖否不可以有血而便為枯症仍從濕治可也再有神情清爽舌腫大不能出口者或兼唇腫此脾濕胃熱鬱極化風而毒延於口用大黃摩入當用劑內舌脹自清神清邪在脾胃神昏即在脾胃神昏即在心脾兩臟第十四論如煙煤舌舌無苔有如煙煤隱隱者慎不可忽視若口渴煩熱而燥者平時胃燥也不可攻之宜甘寒益胃此陰虛而燥若不渴肢寒而舌潤者乃挾陰症宜甘溫扶中此陽虛不可用苦寒只甘溫不可用苦濕此何以故外露而里無也外露熱象里無熱也第十五論黑舌舌黑而滑者水來剋水陰症也當溫之附桂之類若見短縮此腎氣竭也為難治若加人參五味子或救萬一舌黑而乾者黑燥無苔胃無濁邪津枯火熾急急瀉南補北黃連阿膠湯若黑燥而中心厚者胃中有垢濁與邪熱相結土燥水竭急以鹹苦下之元明粉大黃第十六論粉白滑舌並斑疹舌白如粉而滑濁邪甚盛四邊色紫絳者熱邪亦重熱為濕遏溫疫病初人膜原外通肌肉內近胃府即三焦之門戶而實一身之半表半裡也未歸胃腑急急透解吳又可達原飲加減莫待傳入而為險惡之症且見此舌者病必見凶須要小心凡斑疹初見須用只捻照熱閉營中多成斑疹斑從肌肉而出屬胃疹從血絡而出屬經其或斑疹並見此陽明經府皆熱看胸背兩肋點大而在皮盧之上者為斑可雲頭隱隱或瑣碎小粒者為疹又宜見而不宜多見按方書謂斑色紅者為胃熱紫者熱極黑者胃爛然當看外症所合方可斷之春夏之間濕病俱發斑疹為甚如淡紅色四肢清口不湛渴脈不洪數虛斑也此非虛斑即屬陰或胸前微見數點面赤足冷或下利清穀陰斑也此陰盛格陽於上內真寒外假熱逼其無根之火上浮必面赤戴陽當溫之如白通湯之類熱藥冷服不然拒格不受而吐矣若斑色紫而點小者心胞熱也點小即是從血絡而出之疹熱在惱胞點大而紫胃中熱也從肌肉而為斑熱在胃斑黑而光亮者光亮元氣猶充故可救熱毒極熾雖屬不治然其人氣血充者依法治之或可救之若黑而晦者必死黑晦元氣敗黑而隱隱四旁赤色者四旁赤色氣血尚活乃火鬱內伏大用清涼發透間有轉紅而可救者又有夾斑帶疹皆是邪之不一各隨其部而泄或經或府然斑屬血者恆多疹屬氣者不少熱在胃本屬氣分見斑則邪屬血矣疹從血絡而出本屬血分然邪由氣而閉其血方或疹也故治斑疹必當兩清氣血況欲透發必通其血中之氣如赤芍鬱金歸鬚之類以佐犀角元參等如清氣分則用知母石膏以芩連佐桂枝枝亦可通營清熱也斑疹皆是邪氣外露之象發之時宜神情清爽方為外解里和如斑疹出而昏者此正不勝邪而內陷雖用扶正開泄如人參至寶丹之類總歸死者十之八九或胃津內涸之候矣昏而聲音洪厲力氣尚強舌乾黑無苔用大劑滋養雞子黃生地黃阿膠之類或可救之苔黑中心燥者救陰中加鹹苦下之亦可救之第十七論白㾦白㾦小粒如水晶色者此濕熱傷肺邪雖出而氣液枯也必得甘藥補之此言病久宜然若未至久延氣液尚在未傷乃為濕鬱衛分汗出不徹之故當理氣分之邪辛溫疏表如蘇梗藿梗使氣伸汗出邪達而愈枯白如骨者枯白如暴露人獸死骨色多凶氣液竭也第十八論齒血溫病看舌亦須驗齒齒為腎之餘腎主骨齒為骨這余故齒浮齦不腫為腎火水虧也齦為胃之絡胃脈絡於上齦大腸脈絡於下齦皆屬陽明故牙齦腫痛為陽明風火或濕遏火伏熱邪不燥胃津必耗腎液且二經之血走於此處病深動血邪熱入胃必連大腸血循經絡而行遂動血上溢結瓣於上陽血色紫紫如干漆陽明這血陰血色黃黃如醬瓣少陰之血陽血若見安胃為主鮮地霍斛石膏知母之類陰血若見救腎為要生地阿膠之類然豆瓣色者多陰惟病尚不逆者猶可治否則難治矣此何故陰下竭陽上厥也水不勝火第十九論齒燥具枯齒若光燥如石者胃熱甚也證見無汗惡寒衛偏勝也衛陽內郁表氣不通故無汗為衛偏勝辛涼泄衛透汗為要泄衛發汗內熱即從表散凡惡寒而汗出者為表陽虛腠理不固雖有內熱亦非實火如枯骨色者腎液枯也齒燥有光胃液雖干腎氣未竭如枯骨色腎液大敗為難治如上增截潤當作燥觀上水不上承句可知為不上承而心火炎急宜清心救水黃連阿膠湯俟枯處轉潤乃妥若咬牙齧齒者濕熱化風痙病也但咬牙者胃熱氣走其絡也咬牙而脈症皆衰者辦虛無谷以內榮也胃中空內風乘虛而入其絡此何以故虛則喜實耳舌本不縮而硬牙關咬定難開者此非風痰阻絡即欲作痙症用酸物擦之即開酸走肝木來泄土也第二十論齒垢若齒垢如灰糕樣者胃氣無權津亡而濕濁用事多死齒垢由腎熱蒸爍胃中濁氣所結甚色如灰糕則枯敗而津氣俱亡腎胃竭惟有濕濁用事故知必死初病齒縫流清血痛者為胃火沖激出於牙齦屬陽明故痛不痛者為龍火內燔龍火謂腎火宜壯水主齒焦無垢者死齒焦腎水告涸無垢胃液亦竭故死齒焦有垢者腎熱胃劫也有垢者火盛而氣液未竭用調胃承氣微下胃熱當微下之或玉女煎清胃救腎可也腎水虧者用之第二十一論婦人溫病婦病與男同但多胎前產後及經水適斷大凡胎前病古人皆經四物加減用之謂恐邪來害妊也然邪猶在表分當從開達外解倘執用四物反引邪入里輕病變重故必審其邪之淺深而治為至要也如熱極者有用井底泥及藍布浸冷覆蓋腹上等須見邪熱逼胎有胎躍不已之象急清內熱可用此治否則致熱內走反傷其胎皆是護胎之意然亦須看其邪之可解而用之如血膩之藥不零又當審察不零當作不宜斷無試之不零而後更之清熱解邪勿使傷胎即為保護若助氣和氣之藥猶可酌用若滋膩補血本元未傷而用之恐反遏其邪不可固執仍宜步步保護胎元恐正損邪陷也至於產後方書謂慎用苦寒恐傷已亡之陰也然亦要辨其邪以從占解者稍從證用之亦無妨也上者如宣肺之類中者如疏中和中之類不過勿犯下焦謂肝脾腎初治不善邪陷入臟即死且屬虛體當如虛怯人病邪而治此法最妥況產後當血氣沸騰之際最多空隙邪必乘虛內陷虛處受邪為難治也產後大傷下元若稟質陽虛者偶傷寒邪飲食瀉痢不止脾腎氣脫往往二三日即死其陰虛者肝風易熾熱邪乘之即成痙者有之故最為難治陽虛者養陰為先如經水適斷邪將陷於血室少陽衛脈為血室肝主之少陽為肝之表其脈起於氣街氣街又陽明胃經之穴故云隸屬陽明也傷寒言之詳悉不必多贅但數動當作變動或竟作溫邪亦可與正傷寒不同仲景立小柴原湯提出所陷熱邪從少陽提出參棗以扶胃氣必胃無邪及中虛之人方或用之否則肋邪為害因衝脈隸屬陽明也此惟虛者為合治若熱邪陷入與血相結者當宗陶氏陶節庵有傷寒全生集小柴胡湯去參棗加生地桃仁查肉丹皮或犀角等此因邪血結若本經血結自甚必少腹滿痛輕者刺期門穴在左肋重者小柴胡湯去甘草加延胡歸尾桃仁尾桃仁挾寒加肉桂心氣滯加香附陳皮枳殼等此血結為主然熱陷血室之症多有讝語如狂之象與陽明胃熱相似此等病機最須辨別血結者身體必重非若陽明之輕便者何也險主重濁絡脈被阻身之側旁所痹連及胸背皆為阻窒故云邪通絡正合其病往往延久上逆心胞胸中痹痛即陶氏所謂血結胸也王海藏出一桂枝紅花湯加海蛤桃仁原欲表裡上下一時盡解之此方大有巧妙也血室者營血停止之所經脈留會之處即衝脈是也衝脈者奇經八脈之一脈也起於腎下出於氣街並陽明經夾臍上行至胸中而散為十二經之海王水曰沖為血海言諸經之血朝會於此男子則運行生精女子則上為乳汁下為月事用力寒之邪子人則隨經而入男子由陽明而傳以沖之脈與少陰之絡起於腎女子感邪太陽隨經便得而入沖之經並足陽明男子陽明內熱方得而入也衝脈得熱血心妄行在男子則下血讝語在婦人則月水適來蓋言男子不獨謂婦人也針經曰婦人熱人血室有須治而愈有不須治而愈假今婦人中風發熱惡寒經水適來得之七八日熱除而脈遲身涼和脅下滿如結胸狀讝語者此為熱入血室刺期門穴隨其實而瀉之假今婦人中風七八日續得寒熱發作有時經水適斷者此謂熱入血室其血必結故如瘧狀發作有時小柴胡湯主之二者須治而愈者也若發熱書則明瞭夜則讝語如見鬼狀此熱入血室無犯胃氣及上二焦心自愈是不須治而愈者也讝語為病邪之甚者何不須治而愈耶且胸脅滿如結胸讝語是邪氣留結胸脅而不去者必刺期門隨其實而瀉之寒熱如瘧發作有時者是血結而不行也須小柴胡湯散之二者既有留邪必須治之可也若發熱經水適來書日明瞭暮則讝語此經水既來以里無留邪但不妄犯熱隨血散必自愈經曰血自下下者愈故無犯胃氣及上二焦必自愈所謂妄犯者恐以讝語為陽明內實攻之犯其胃氣也此無胸脅之邪恐刺期門犯其中焦也也此無血結恐與小柴胡湯犯其上焦也小柴胡湯解散則動衛出上焦動衛氣是犯上焦也刺期門則動營氣營出中焦動營氣是犯中焦也脈以曰無犯胃氣及上二焦豈但言藥不言針耶邪入血室仲景分淺深而立兩法其邪深者如結胸狀若讝語刺期門穴隨其實而瀉之是從肝而瀉其邪亦即陶氏所謂之血結胸也其邪淺者往來寒熱如瘧狀而無讝語用小柴胡湯是從膽治也蓋往來寒熱是少陽之證故以小柴原湯提少陽之邪則血室之熱亦可隨之而出以肝膽為表裡故深則從肝淺則從膽以導泄血室之邪也其言小柴胡湯惟虛者合治何也蓋傷寒之邪由經而入血室其胃無邪故可用參棗若溫熱之邪先已犯胃後入血室故當去參棗惟胃無邪及中虛之人方可用之須知傷寒之用小柴胡湯者正防少陽經邪乘虛入胃故用參棗先助胃以御之如上言法宜益胃共與溫熱之邪來路不同故治法有異也
